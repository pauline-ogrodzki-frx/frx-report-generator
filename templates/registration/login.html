{% extends "base.html" %}

{% block content %}

<div class="card">
    <h1>FRX Report Generator Login</h1>

    {% if form.errors %}
        <p style="color: red;">
            Your username and password did not match. Please try again.
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="button">
            Login
        </button>
    </form>
</div>

{% endblock %}
