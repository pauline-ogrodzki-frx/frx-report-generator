{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>FRX Report Generator</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

    <header class="header">

        <a href="{% url 'platform_dashboard' %}" class="brand-link">
            <img src="{% static 'images/frx-logo.png' %}" alt="FRX logo" class="brand-logo">
            <span class="brand-text">FRX Report Generator</span>
        </a>

        <nav class="nav">
            <a href="{% url 'platform_dashboard' %}">Dashboard</a>
            <a href="{% url 'create_report' %}">Create Report</a>
            <a href="{% url 'report_history' %}">Report History</a>
            <a href="{% url 'missing_taxa_dashboard' %}">Missing Taxa</a>
            <a href="{% url 'knowledge_dashboard' %}">Knowledge Base</a>
            <a href="/admin/">Admin</a>
        </nav>

    </header>

    <main class="container">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

</body>
</html>
